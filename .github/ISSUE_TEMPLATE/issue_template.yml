name: Bug Report or Feature Request
description: Report a bug or request a feature for the TMAS GitHub Action
title: "[Issue]: "

body:
  - type: dropdown
    id: issue-type
    attributes:
      label: Issue Type
      description: Select the type of issue you're reporting
      options:
        - 🐛 Bug Report
        - 🍕 Feature Request
        - 📝 Documentation Issue
        - ❓ Question/Support
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the bug or feature
      placeholder: Provide a clear and concise description
    validations:
      required: true

  - type: input
    id: action-version
    attributes:
      label: Action Version
      description: Which version of the action are you using?
      placeholder: "e.g., v3.0.0"
    validations:
      required: false

  - type: input
    id: tmas-version
    attributes:
      label: TMAS CLI Version
      description: Which version of TMAS CLI are you using?
      placeholder: "e.g., 2.67.0 or latest"
    validations:
      required: false

  - type: input
    id: runner-os
    attributes:
      label: Runner OS
      description: Which operating system is the GitHub runner using?
      placeholder: "e.g., ubuntu-22.04, windows-2022, macos-latest, other"
    validations:
      required: false

  - type: input
    id: artifact-type
    attributes:
      label: Artifact Type
      description: What type of artifact are you scanning?
      placeholder: "e.g., registry:image, dir:., file:package.json"
    validations:
      required: false

  - type: textarea
    id: action-config
    attributes:
      label: Action Configuration
      description: Paste your action usage here (remove any sensitive information)
      placeholder: |
        - name: TMAS Scan
          uses: your-org/tmas-github-action@v3
          with:
            artifact: registry:image:app:latest
      render: yaml
    validations:
      required: false

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: For bug reports, provide clear steps to reproduce the issue
      placeholder: |
        1. First step
        2. Second step
        3. And so on...
    validations:
      required: false

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: Describe what should happen
    validations:
      required: false

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: Describe what actually happened
    validations:
      required: false
